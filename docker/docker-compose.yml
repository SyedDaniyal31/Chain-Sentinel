services:
  postgres:
    image: postgres:16-alpine
    container_name: cs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chainsentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chainsentinel_dev}
      POSTGRES_DB: ${POSTGRES_DB:-chainsentinel}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - cs_postgres_data:/var/lib/postgresql/data
      - ../database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chainsentinel} -d ${POSTGRES_DB:-chainsentinel}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cs-net
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: cs-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - cs_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - cs-net
    deploy:
      resources:
        limits:
          memory: 256M

  adminer:
    image: adminer:4
    container_name: cs-adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cs-net
    profiles:
      - tools

volumes:
  cs_postgres_data:
    name: cs_postgres_data
  cs_redis_data:
    name: cs_redis_data

networks:
  cs-net:
    name: cs-net
    driver: bridge
